name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install bubblewrap
        run: npm i -g @bubblewrap/cli

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android.keystore

      - name: Build TWA
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          expect << 'EOF'
            set keystore_pass $env(KEYSTORE_PASS)
            set key_pass $env(KEY_PASS)
            spawn bubblewrap build --skipPwaValidation
            expect "Key Store password"
            send "$keystore_pass\r"
            expect "Key password"
            send "$key_pass\r"
            expect eof
          EOF

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: juqa-android-${{ github.ref_name }}
          path: |
            app-release-signed.apk
            app-release-bundle.aab
